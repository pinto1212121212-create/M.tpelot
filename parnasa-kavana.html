<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>כוונת הפרנסה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700;900&family=David+Libre:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#e9c46a; --gold-bright:#ffe9a8; --gold-deep:#b8860b; --amber:#f2a900;
    --ink:#05060e; --muted:#b7a98a;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:#000;}
  body{
    font-family:'Frank Ruhl Libre','David Libre',serif;
    color:#fff; position:fixed; inset:0;
    overscroll-behavior:none; touch-action:none;
    user-select:none; -webkit-user-select:none;
  }
  #stage{position:absolute;inset:0;}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}

  /* ===== top controls ===== */
  .ctrl{
    position:absolute; top:max(16px,env(safe-area-inset-top)); z-index:20;
    width:46px;height:46px;border-radius:50%;
    background:rgba(20,22,38,0.55); backdrop-filter:blur(10px);
    border:1px solid rgba(233,196,106,0.35);
    color:var(--gold-bright); font-size:20px; cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:transform .2s, background .2s;
  }
  .ctrl:active{transform:scale(.9);}
  #closeBtn{right:16px;}
  #soundBtn{left:16px;}

  /* ===== text overlay ===== */
  #overlay{
    position:absolute; left:0; right:0;
    bottom:clamp(60px,16vh,150px);
    z-index:10; text-align:center; padding:0 26px;
    pointer-events:none;
  }
  #kicker{
    font-size:15px; letter-spacing:2px; font-weight:500;
    color:rgba(255,255,255,0.82);
    text-shadow:0 2px 18px rgba(0,0,0,0.9);
    margin-bottom:14px; min-height:20px;
  }
  #name{
    font-weight:900;
    font-size:clamp(38px,11vw,66px); line-height:1.15;
    color:var(--gold-bright);
    text-shadow:0 0 26px rgba(242,169,0,0.75),0 0 60px rgba(242,169,0,0.45),0 3px 10px rgba(0,0,0,.8);
    letter-spacing:1px;
  }
  #sub{
    font-weight:700; font-size:clamp(19px,5.4vw,30px);
    color:var(--gold); margin-top:10px;
    text-shadow:0 0 18px rgba(242,169,0,0.5),0 2px 8px rgba(0,0,0,.85);
  }
  #how{
    font-family:'David Libre',serif;
    font-size:clamp(15px,4.3vw,21px); line-height:1.7; font-weight:500;
    color:rgba(255,248,230,0.94); margin-top:20px;
    max-width:560px; margin-left:auto;margin-right:auto;
    text-shadow:0 2px 14px rgba(0,0,0,0.95);
  }
  #src{
    font-size:12.5px; color:var(--muted); margin-top:14px;
    letter-spacing:.5px; font-style:italic;
    text-shadow:0 2px 10px rgba(0,0,0,0.9);
  }
  .fade{animation:rise .9s cubic-bezier(.2,.8,.2,1) both;}
  @keyframes rise{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:none;}}

  /* ===== bottom hint + dots ===== */
  #hint{
    position:absolute; left:0;right:0;
    bottom:max(20px,calc(env(safe-area-inset-bottom) + 14px));
    z-index:10; text-align:center;
    font-size:12.5px; color:rgba(233,196,106,0.7);
    letter-spacing:1px; pointer-events:none;
  }
  #dots{
    position:absolute; left:0;right:0;
    bottom:max(46px,calc(env(safe-area-inset-bottom) + 40px));
    z-index:10; display:flex;gap:9px;justify-content:center;
  }
  .dot{
    width:8px;height:8px;border-radius:50%;
    background:rgba(233,196,106,0.3); cursor:pointer;
    transition:all .35s; pointer-events:auto;
  }
  .dot.on{background:var(--gold-bright);width:24px;border-radius:5px;
    box-shadow:0 0 12px rgba(242,169,0,.8);}

  /* ===== intro veil ===== */
  #veil{
    position:absolute;inset:0;z-index:30;background:#05060e;
    display:flex;align-items:center;justify-content:center;flex-direction:column;
    transition:opacity 1.1s ease; cursor:pointer; text-align:center; padding:30px;
  }
  #veil.gone{opacity:0;pointer-events:none;}
  #veil .vt{font-weight:900;font-size:clamp(30px,9vw,52px);color:var(--gold-bright);
    text-shadow:0 0 30px rgba(242,169,0,.7);}
  #veil .vs{font-family:'David Libre',serif;font-size:16px;color:var(--muted);margin-top:18px;letter-spacing:1px;}
  #veil .vgo{margin-top:34px;font-size:14px;color:var(--gold);
    border:1px solid rgba(233,196,106,.5);border-radius:30px;padding:12px 30px;
    animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:.55;transform:scale(1);}50%{opacity:1;transform:scale(1.05);}}
  @media (prefers-reduced-motion: reduce){.fade{animation:none;} #veil .vgo{animation:none;}}
</style>
</head>
<body>
<div id="stage">
  <canvas id="c"></canvas>
</div>

<button class="ctrl" id="closeBtn" aria-label="סגור">✕</button>
<button class="ctrl" id="soundBtn" aria-label="צליל">🔇</button>

<div id="overlay">
  <div id="kicker"></div>
  <div id="name"></div>
  <div id="sub"></div>
  <div id="how"></div>
  <div id="src"></div>
</div>

<div id="dots"></div>
<div id="hint">גע וגרור כדי לסובב · גע במסך כדי להמשיך</div>

<div id="veil">
  <div class="vt">כַּוָּנַת הַפַּרְנָסָה</div>
  <div class="vs">חמש כוונות שמות הקודש לפרנסה ולשפע<br>מכוונים בְּמַחְשָׁבָה בלבד · הבקשה אל ה׳ לבדו</div>
  <div class="vgo">גע כדי להתחיל ✦</div>
</div>

<script>
(function(){
  "use strict";

  // ===== Content — five parnasa kavanot =====
  const KAVANOT = [
    { kicker:'כּוֹנֵן בְּלִבְּךָ',
      name:'פּוֹתֵחַ אֶת יָדֶךָ',
      sub:'וּמַשְׂבִּיעַ לְכָל חַי רָצוֹן',
      how:'כַּוֵּן שֶׁה׳ פּוֹתֵחַ אֶת שַׁעֲרֵי הַשֶּׁפַע וּמְפַרְנֵס אֶת כָּל הָעוֹלָם בְּרָצוֹן.',
      src:'תהילים קמ״ה · חובה לכוון בפסוק זה (שו״ע או״ח נ״א, ז׳)' },
    { kicker:'מַלְאַךְ הַפַּרְנָסָה',
      name:'חֲתָ״ךְ',
      sub:'שֶׁבּוֹ נֶחְתָּכִים הַמְּזוֹנוֹת',
      how:'כַּוֵּן שֶׁפַּרְנָסָתְךָ נֶחְתֶּכֶת וְנִמְשֶׁכֶת מֵאֵת ה׳ לְבַדּוֹ — וְהַמַּלְאָךְ אֵינוֹ אֶלָּא צִינוֹר לִשְׁלִיחוּתוֹ.',
      src:'סידור האר״י · גימטרייה 428' },
    { kicker:'שֵׁם קָדוֹשׁ לַפַּרְנָסָה',
      name:'דִּיקַרְנוֹסָ״א',
      sub:'מִפְּסוּקֵי ״אוֹר פָּנֶיךָ״',
      how:'כַּוֵּן בְּמַחְשָׁבָה שֶׁיָּאֵר ה׳ פָּנָיו אֵלֶיךָ וְיִשְׁלַח לְךָ פַּרְנָסָה בְּרֶוַח.',
      src:'נזכר ב׳סדר הפרנסה׳ · היוועץ ברב' },
    { kicker:'מְקוֹר כָּל הַחַיִּים',
      name:'שֵׁם הֲוָיָ״ה ב״ה',
      sub:'מִמֶּנּוּ נִמְשָׁךְ כָּל הַטּוֹב',
      how:'צַיֵּר בְּמַחְשָׁבְתְּךָ אֶת אוֹתִיּוֹת הַשֵּׁם הַקָּדוֹשׁ, וְכַוֵּן שֶׁכָּל הַשֶּׁפַע יוֹרֵד וְנִמְשָׁךְ מִמֶּנּוּ אֵלֶיךָ.',
      src:'בְּמַחְשָׁבָה בלבד — לא לבטא בפה' },
    { kicker:'שֵׁם הַחֶסֶד',
      name:'שֵׁם ע״ב',
      sub:'צִינוֹר הַשֶּׁפַע וְהָרַחֲמִים',
      how:'כַּוֵּן בְּשֵׁם הַחֶסֶד (גימטרייה 72) לְהַמְשָׁכַת פַּרְנָסָה בְּרֶוַח וּבְרַחֲמִים.',
      src:'מילוי יודי״ן · מסידורי המקובלים' },
  ];

  // ===== Canvas particle nebula =====
  const cvs = document.getElementById('c');
  const ctx = cvs.getContext('2d');
  let W=0,H=0,DPR=1,CX=0,CY=0;
  function resize(){
    DPR = Math.min(window.devicePixelRatio||1, 2);
    W = window.innerWidth; H = window.innerHeight;
    cvs.width = W*DPR; cvs.height = H*DPR;
    cvs.style.width=W+'px'; cvs.style.height=H+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
    CX=W/2; CY=H*0.42;
  }
  window.addEventListener('resize', resize);
  resize();

  // golden glow sprite (pre-rendered for performance)
  const sprite = document.createElement('canvas');
  sprite.width = sprite.height = 64;
  (function(){
    const s = sprite.getContext('2d');
    const g = s.createRadialGradient(32,32,0,32,32,32);
    g.addColorStop(0,'rgba(255,247,220,1)');
    g.addColorStop(0.25,'rgba(255,214,120,0.9)');
    g.addColorStop(0.55,'rgba(242,169,0,0.45)');
    g.addColorStop(1,'rgba(242,169,0,0)');
    s.fillStyle=g; s.fillRect(0,0,64,64);
  })();

  // build a globular cluster: dense bright core, sparse glittering halo
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const N = reduced ? 240 : (W<480 ? 520 : 760);
  const P = [];
  for(let i=0;i<N;i++){
    // radius biased to centre (cube for tight core)
    const r = Math.pow(Math.random(),2.2) * (Math.min(W,H)*0.46) + 4;
    const u = Math.random()*2-1, t = Math.random()*Math.PI*2;
    const sq = Math.sqrt(1-u*u);
    P.push({
      x: sq*Math.cos(t)*r,
      y: u*r*0.78,                 // slight vertical flatten
      z: sq*Math.sin(t)*r,
      size: (0.7+Math.random()*2.4) * (1 - r/(Math.min(W,H)*0.5))*0.9 + 0.5,
      tw: Math.random()*Math.PI*2, // twinkle phase
      tws: 0.6+Math.random()*1.8,
    });
  }

  let rotY=0, rotX=-0.12, autoY=0.0014;
  let dragVX=0, dragVY=0, dragging=false, lastX=0,lastY=0;
  let breath=0, pulse=0;

  function project(p, sinY,cosY,sinX,cosX){
    // rotate Y then X
    let x = p.x*cosY - p.z*sinY;
    let z = p.x*sinY + p.z*cosY;
    let y = p.y*cosX - z*sinX;
    z = p.y*sinX + z*cosX;
    const persp = 520/(520+z);
    return {sx:CX + x*persp, sy:CY + y*persp, depth:persp, z:z};
  }

  function frame(ts){
    breath += 0.012;
    const bs = 1 + Math.sin(breath)*0.045;           // breathing scale
    if(pulse>0) pulse *= 0.94;

    // momentum / auto rotation
    if(!dragging){
      rotY += autoY + dragVX;
      rotX += dragVY;
      dragVX *= 0.94; dragVY *= 0.94;
      rotX += (-0.12 - rotX)*0.012;                  // ease X back to rest tilt
    }
    const sinY=Math.sin(rotY),cosY=Math.cos(rotY),sinX=Math.sin(rotX),cosX=Math.cos(rotX);

    // background
    ctx.globalCompositeOperation='source-over';
    const bg = ctx.createRadialGradient(CX,CY,0,CX,CY,Math.max(W,H)*0.75);
    bg.addColorStop(0,'#0d1024'); bg.addColorStop(0.5,'#070812'); bg.addColorStop(1,'#020208');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

    // central core glow (breathes + pulses on transition)
    ctx.globalCompositeOperation='lighter';
    const coreR=(Math.min(W,H)*0.30)*bs*(1+pulse*0.5);
    const cg=ctx.createRadialGradient(CX,CY,0,CX,CY,coreR);
    cg.addColorStop(0,'rgba(255,245,210,'+(0.55+pulse*0.3)+')');
    cg.addColorStop(0.3,'rgba(242,180,40,0.30)');
    cg.addColorStop(1,'rgba(242,169,0,0)');
    ctx.fillStyle=cg; ctx.beginPath();ctx.arc(CX,CY,coreR,0,7);ctx.fill();

    // particles (sort-free additive — depth via alpha/size)
    for(let i=0;i<N;i++){
      const p=P[i];
      const pr=project(p,sinY,cosY,sinX,cosX);
      const tw=0.55+0.45*Math.sin(ts*0.001*p.tws + p.tw);
      const sz=Math.max(0.6,p.size*pr.depth*bs*(1+pulse*0.4))*2.4;
      const a=Math.min(1, (0.18+pr.depth*0.7)*tw);
      ctx.globalAlpha=a;
      ctx.drawImage(sprite, pr.sx-sz/2, pr.sy-sz/2, sz, sz);
    }
    ctx.globalAlpha=1;
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // ===== drag to rotate =====
  const stage=document.getElementById('stage');
  function down(x,y){dragging=true;lastX=x;lastY=y;dragVX=0;dragVY=0;}
  function move(x,y){
    if(!dragging)return;
    const dx=x-lastX, dy=y-lastY; lastX=x;lastY=y;
    rotY += dx*0.005; rotX += dy*0.004;
    rotX=Math.max(-1.2,Math.min(1.2,rotX));
    dragVX=dx*0.0006; dragVY=dy*0.0004;
  }
  function up(){dragging=false;}
  stage.addEventListener('mousedown',e=>down(e.clientX,e.clientY));
  window.addEventListener('mousemove',e=>move(e.clientX,e.clientY));
  window.addEventListener('mouseup',up);
  stage.addEventListener('touchstart',e=>{const t=e.touches[0];down(t.clientX,t.clientY);},{passive:true});
  stage.addEventListener('touchmove',e=>{const t=e.touches[0];move(t.clientX,t.clientY);},{passive:true});
  stage.addEventListener('touchend',up);

  // ===== text cycling =====
  const elKick=document.getElementById('kicker'),elName=document.getElementById('name'),
        elSub=document.getElementById('sub'),elHow=document.getElementById('how'),
        elSrc=document.getElementById('src'),overlay=document.getElementById('overlay'),
        dotsWrap=document.getElementById('dots');
  let idx=-1, timer=null, started=false;

  KAVANOT.forEach((_,i)=>{
    const d=document.createElement('div');d.className='dot';
    d.addEventListener('click',()=>{go(i);});
    dotsWrap.appendChild(d);
  });
  const dotEls=[...dotsWrap.children];

  function render(){
    const k=KAVANOT[idx];
    [elKick,elName,elSub,elHow,elSrc].forEach(el=>el.classList.remove('fade'));
    void overlay.offsetWidth;
    elKick.textContent=k.kicker; elName.textContent=k.name;
    elSub.textContent=k.sub; elHow.textContent=k.how; elSrc.textContent=k.src;
    [elKick,elName,elSub,elHow,elSrc].forEach((el,j)=>{
      el.style.animationDelay=(j*0.09)+'s'; el.classList.add('fade');
    });
    dotEls.forEach((d,i)=>d.classList.toggle('on',i===idx));
    pulse=1; // particle flash on change
  }
  function go(i){
    idx=(i+KAVANOT.length)%KAVANOT.length;
    render(); schedule();
  }
  function next(){go(idx+1);}
  function schedule(){clearTimeout(timer);timer=setTimeout(next,8200);}

  // advance on tap (but not while dragging / on controls)
  let tapX=0,tapY=0;
  stage.addEventListener('pointerdown',e=>{tapX=e.clientX;tapY=e.clientY;});
  stage.addEventListener('pointerup',e=>{
    if(!started)return;
    const moved=Math.hypot(e.clientX-tapX,e.clientY-tapY);
    if(moved<8) next();
  });

  // ===== intro veil =====
  const veil=document.getElementById('veil');
  function start(){
    if(started)return; started=true;
    veil.classList.add('gone');
    setTimeout(()=>veil.style.display='none',1200);
    go(0);
  }
  veil.addEventListener('click',start);

  // ===== ambient sound (soft pad via WebAudio, opt-in) =====
  let actx=null,gain=null,sounding=false;
  const soundBtn=document.getElementById('soundBtn');
  function buildAudio(){
    actx=new (window.AudioContext||window.webkitAudioContext)();
    gain=actx.createGain(); gain.gain.value=0; gain.connect(actx.destination);
    // gentle two-oscillator drone (perfect fifth) + slow tremolo
    [196,294].forEach((f,i)=>{
      const o=actx.createOscillator(); o.type='sine'; o.frequency.value=f;
      const og=actx.createGain(); og.gain.value=i?0.4:0.6;
      o.connect(og); og.connect(gain); o.start();
    });
    const lfo=actx.createOscillator(); lfo.frequency.value=0.12;
    const lg=actx.createGain(); lg.gain.value=0.04;
    lfo.connect(lg); lg.connect(gain.gain); lfo.start();
  }
  function toggleSound(e){
    e&&e.stopPropagation();
    if(!actx)buildAudio();
    if(actx.state==='suspended')actx.resume();
    sounding=!sounding;
    gain.gain.cancelScheduledValues(actx.currentTime);
    gain.gain.linearRampToValueAtTime(sounding?0.09:0, actx.currentTime+0.8);
    soundBtn.textContent=sounding?'🔊':'🔇';
  }
  soundBtn.addEventListener('click',toggleSound);

  // ===== close =====
  document.getElementById('closeBtn').addEventListener('click',function(e){
    e.stopPropagation();
    try{ if(window.opener && !window.opener.closed){ window.close(); return; } }catch(_){}
    if(history.length>1) history.back(); else location.href='index.html';
  });
})();
</script>
</body>
</html>
