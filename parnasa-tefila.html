<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>תפילה לפרנסה ולרווחה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{ --fs:18px; }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    background:#f4ead3; color:#3a2616;
    font-family:'Frank Ruhl Libre',serif; line-height:1.95;
    padding-top:64px; -webkit-text-size-adjust:100%;
  }
  .bar{
    position:fixed; top:0; left:0; right:0; height:64px; z-index:50;
    background:linear-gradient(180deg,#1d4a2a,#143a20);
    display:flex; align-items:center; justify-content:space-between;
    padding:0 14px; box-shadow:0 2px 12px rgba(20,40,25,.35);
    padding-top:env(safe-area-inset-top);
  }
  .bar .title{ color:#e9d49a; font-weight:900; font-size:19px; letter-spacing:.5px; }
  .bar .title small{ display:block; font-size:11px; font-weight:500; color:#c7d8b0; letter-spacing:0; }
  .bar button{
    background:rgba(255,255,255,.1); border:1px solid rgba(233,212,154,.4);
    color:#e9d49a; border-radius:9px; cursor:pointer; font-family:inherit;
    width:40px; height:40px; font-size:18px; font-weight:700;
  }
  .bar button:active{ transform:scale(.92); }
  .grp{ display:flex; gap:8px; align-items:center; }
  .content{ max-width:680px; margin:0 auto; padding:26px 22px 80px; font-size:var(--fs); text-align:right; }
  .content p{ margin:0 0 16px; }
  .opening{ text-align:center; color:#1d6a3a; font-weight:700; margin:6px 0 22px; line-height:1.8; }
  .footer{ text-align:center; color:#8a6a4a; font-size:13px; margin-top:18px; }
</style>
</head>
<body>
<div class="bar">
  <button id="closeBtn" aria-label="סגור">✕</button>
  <div class="title">תפילה לפרנסה ולרווחה<small>תחנונים מעוררי לב</small></div>
  <div class="grp">
    <button id="fsMinus" aria-label="הקטן">א−</button>
    <button id="fsPlus" aria-label="הגדל">א+</button>
  </div>
</div>

<div class="content" id="content"></div>

<script type="text/plain" id="src">
אֲרוֹמִמְךָ אֱלוֹהַי הַמֶּלֶךְ, וַאֲבָרְכָה שִׁמְךָ לְעוֹלָם וָעֶד. עֵינֵי כֹל אֵלֶיךָ יְשַׂבֵּרוּ, וְאַתָּה נוֹתֵן לָהֶם אֶת אָכְלָם בְּעִתּוֹ. פּוֹתֵחַ אֶת יָדֶךָ, וּמַשְׂבִּיעַ לְכָל חַי רָצוֹן. ה׳ רֹעִי לֹא אֶחְסָר.
רִבּוֹנוֹ שֶׁל עוֹלָם, הַזָּן וּמְפַרְנֵס אֶת כָּל הָעוֹלָם כֻּלּוֹ בְּטוּבוֹ בְּחֵן בְּחֶסֶד וּבְרַחֲמִים. מֵעוֹלָם לֹא חָסַר לָנוּ, וְאַל יֶחְסַר לָנוּ מָזוֹן לְעוֹלָם וָעֶד. אַתָּה לְבַדְּךָ הַנּוֹתֵן לֶחֶם לְכָל בָּשָׂר, וּמִיָּדְךָ הַמְּלֵאָה וְהָרְחָבָה בָּא כָּל טוּב. מוֹדֶה אֲנִי לְפָנֶיךָ עַל כָּל פְּרוּטָה וּפְרוּטָה שֶׁנָּתַתָּ לִי עַד הַיּוֹם, וְעַל כָּל לֶחֶם שֶׁאָכַלְתִּי מִשֻּׁלְחָנְךָ הַטּוֹב. כִּי אַתָּה זַנְתָּ אוֹתִי מֵעוֹדִי, וְאַתָּה תְּכַלְכְּלֵנִי עַד זִקְנָה וְשֵׂיבָה.
רִבּוֹנוֹ שֶׁל עוֹלָם, אַתָּה לְבַד יוֹדֵעַ אֶת הַמַּשָּׂא שֶׁאֲנִי נוֹשֵׂא בְּלִבִּי. אַתָּה יוֹדֵעַ אֶת הַדְּאָגָה לַפַּרְנָסָה, אֶת הַלֵּילוֹת שֶׁאֲנִי שׁוֹכֵב וְלִבִּי עֵר מֵרֹב מַחְשָׁבוֹת, אֶת הַחֶשְׁבּוֹנוֹת וְהַחוֹבוֹת וְהַלַּחַץ שֶׁנִּדְמֶה שֶׁאֵין לוֹ סוֹף. אָבִי שֶׁבַּשָּׁמַיִם, אֵין לִי אֶל מִי לִפְנוֹת אֶלָּא אֵלֶיךָ לְבַד. הִנְנִי מַשְׁלִיךְ עָלֶיךָ אֶת כָּל יְהָבִי וְאֶת כָּל מַשָּׂאִי וְאֶת כָּל דַּאֲגוֹתַי, כְּמוֹ שֶׁכָּתוּב: הַשְׁלֵךְ עַל ה׳ יְהָבְךָ וְהוּא יְכַלְכְּלֶךָ, לֹא יִתֵּן לְעוֹלָם מוֹט לַצַּדִּיק.
וּבְכֵן, יְהִי רָצוֹן מִלְּפָנֶיךָ ה׳ אֱלֹהַי וֵאלֹהֵי אֲבוֹתַי, שֶׁתְּזַמֵּן לִי וּלְכָל בְּנֵי בֵיתִי פַּרְנָסָה טוֹבָה וּרְוָחָה, פַּרְנָסָה בְּרֶוַח וְלֹא בְּצִמְצוּם, בְּכָבוֹד וְלֹא בְּבִזָּיוֹן, בְּהֶתֵּר וְלֹא בְּאִסּוּר, בְּנַחַת וְלֹא בְּצַעַר. שֶׁתְּהֵא פַּרְנָסָתִי מְצוּיָה וּמְזֻמֶּנֶת לִי בְּכָל עֵת וּבְכָל שָׁעָה, וְלֹא אֶצְטָרֵךְ לְמַתְּנַת בָּשָׂר וָדָם וְלֹא לִידֵי הַלְוָאָתָם, אֶלָּא לְיָדְךָ הַמְּלֵאָה וְהָרְחָבָה.
בָּרֵךְ נָא ה׳ אֶת כָּל מַעֲשֵׂה יָדַי, וְתֵן בְּרָכָה וְהַצְלָחָה בְּכָל מְלַאכְתִּי וּבְכָל אֲשֶׁר אֶפְנֶה. שֶׁלֹּא יִיגַע עֲמָלִי לָרִיק, אֶלָּא יִשָּׂא פְּרִי וּבְרָכָה. וְזַכֵּנִי לְרֶכֶב טוֹב וְכָשֵׁר לְפַרְנָסָתִי וּלְצָרְכֵי בֵּיתִי, וּשְׁמֹר אֶת צֵאתִי וְאֶת בּוֹאִי בְּכָל הַדְּרָכִים, שֶׁאֵצֵא וְאָשׁוּב לְבֵיתִי לְשָׁלוֹם, בְּלֹא נֶזֶק וּבְלֹא תַקָּלָה. וְתֵן לִי חֵן וָחֶסֶד וְשֵׂכֶל טוֹב בְּעֵינֶיךָ וּבְעֵינֵי כָל רוֹאַי, וְיִפָּתְחוּ לְפָנַי הַלְּבָבוֹת וְהַשְּׁעָרִים בְּכָל מָקוֹם שֶׁאָבוֹא. וִיהִי נֹעַם ה׳ אֱלֹהֵינוּ עָלֵינוּ, וּמַעֲשֵׂה יָדֵינוּ כּוֹנְנָה עָלֵינוּ.
וְתֵן בְּלִבִּי בִּטָּחוֹן שָׁלֵם בְּךָ, שֶׁאֵדַע בֶּאֱמֶת וּבְהַכָּרָה גְמוּרָה כִּי הַכֹּל מִיָּדְךָ לְבַד, וְכִי אֵין שׁוּם כֹּחַ וְשׁוּם אָדָם בָּעוֹלָם שֶׁיָּכוֹל לְהוֹסִיף אוֹ לִגְרֹעַ מִמַּה שֶּׁקָּצַבְתָּ לִי לְטוֹבָה. הָסֵר מִלִּבִּי כָּל פַּחַד וְכָל דְּאָגָה וְכָל חֲרָדָה מִן הַפַּרְנָסָה, וְתֵן בִּי שַׁלְוָה וּמְנוּחַת הַנֶּפֶשׁ מִתּוֹךְ הַבִּטָּחוֹן בְּךָ. וְשֶׁאֶזְכֶּה לְקַיֵּם בְּלִבִּי: בְּטַח בַּה׳ וַעֲשֵׂה טוֹב, כְּמוֹ שֶׁכָּתוּב: בָּרוּךְ הַגֶּבֶר אֲשֶׁר יִבְטַח בַּה׳, וְהָיָה ה׳ מִבְטַחוֹ.
רִבּוֹנוֹ שֶׁל עוֹלָם, מָלֵא רַחֲמִים, אֲנִי מַאֲמִין בֶּאֱמוּנָה שְׁלֵמָה שֶׁאֵין שׁוּם יֵאוּשׁ בָּעוֹלָם כְּלָל, וְשֶׁאַתָּה יָכוֹל לַהֲפֹךְ אֶת כָּל מַצָּבִי לְטוֹבָה כְּהֶרֶף עַיִן. כִּי אֵין מַעְצוֹר לַה׳ לְהוֹשִׁיעַ, וִישׁוּעַת ה׳ כְּהֶרֶף עַיִן. הֲפֹךְ נָא אֶת דַּאֲגָתִי לְשִׂמְחָה, וְאֶת הַדֹּחַק לִרְוָחָה, וְאֶת הֶחָסֵר לְשֶׁפַע. פְּתַח לִי אֶת אוֹצָרְךָ הַטּוֹב, וְהָרֵק עָלַי בְּרָכָה עַד בְּלִי דָי, וְתַשְׁבִּיעֵנִי מִטּוּבְךָ וְלֹא אֵבוֹשׁ לְעוֹלָם.
וּתְזַכֵּנִי לַעֲבֹד אוֹתְךָ בְּשִׂמְחָה וּבְלֵב טוֹב, וְשֶׁלֹּא יַטְרִידֵנִי עֹל הַפַּרְנָסָה מֵעֲבוֹדָתְךָ וּמִתּוֹרָתֶךָ וּמִתְּפִלָּתֶךָ. וְתֵן לִי וּלְבֵיתִי חַיִּים שֶׁל בְּרָכָה וְשֶׁל שָׁלוֹם, חַיִּים שֶׁל פַּרְנָסָה טוֹבָה, חַיִּים שֶׁיֵּשׁ בָּהֶם יִרְאַת שָׁמַיִם וְאַהֲבָתֶךָ. וּתְמַלֵּא אֶת כָּל מִשְׁאֲלוֹת לִבִּי לְטוֹבָה. יִהְיוּ לְרָצוֹן אִמְרֵי פִי וְהֶגְיוֹן לִבִּי לְפָנֶיךָ, ה׳ צוּרִי וְגוֹאֲלִי. אָמֵן כֵּן יְהִי רָצוֹן.
</script>

<script>
(function(){
  var raw=document.getElementById('src').textContent;
  var lines=raw.split('\n').map(function(s){return s.trim();}).filter(Boolean);
  var out=document.getElementById('content'); var frag=document.createDocumentFragment();
  lines.forEach(function(ln,i){
    var el=document.createElement('p');
    if(i===0) el.className='opening';
    el.textContent=ln; frag.appendChild(el);
  });
  out.appendChild(frag);

  var KEY='parnasa_fs';
  var fs=parseInt(localStorage.getItem(KEY)||'18',10); if(isNaN(fs)) fs=18;
  function applyFs(){ document.documentElement.style.setProperty('--fs',fs+'px'); try{localStorage.setItem(KEY,String(fs));}catch(e){} }
  applyFs();
  document.getElementById('fsPlus').addEventListener('click',function(){ fs=Math.min(30,fs+2); applyFs(); });
  document.getElementById('fsMinus').addEventListener('click',function(){ fs=Math.max(13,fs-2); applyFs(); });
  document.getElementById('closeBtn').addEventListener('click',function(){
    try{ if(window.opener && !window.opener.closed){ window.close(); return; } }catch(e){}
    if(history.length>1) history.back(); else location.href='index.html';
  });
})();
</script>
</body>
</html>
